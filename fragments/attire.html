<!-- ATTIRE -->
<section id="attire">
  <span class="section-tag">Dress Code</span>
  <h2 class="section-title">What to Wear</h2>
  <div class="section-rule"></div>
  <p class="section-intro">The occasion calls for strictly formal attire. Please dress to celebrate with us.</p>

  <div class="attire-grid">
    <button type="button" class="attire-card"
      aria-label="View dusty blue principal sponsors attire guide larger"
      onclick="openAttireLightbox('images/attire-dusty-blue.png', 'Dusty Blue Barong Tagalog and Long Gown', 'Dusty Blue', 'Principal Sponsors · Barong Tagalog &amp; Long Gown')">
      <div class="attire-illustration dusty-bg">
        <img src="images/attire-dusty-blue.png" alt="" loading="lazy" decoding="async">
        <span class="attire-zoom-hint">Tap to enlarge</span>
      </div>
      <div class="attire-body">
        <div class="attire-swatch dusty"></div>
        <p class="attire-label">Principal Sponsors</p>
        <p class="attire-name">Dusty Blue</p>
        <p class="attire-desc">Formal attire in shades of dusty blue.</p>
        <div class="attire-outfits">
          <span class="attire-outfit-tag dusty">♦ Barong Tagalog</span>
          <span class="attire-outfit-tag dusty">♦ Long Gown</span>
        </div>
      </div>
    </button>
    <button type="button" class="attire-card"
      aria-label="View sage green guest attire guide larger"
      onclick="openAttireLightbox('images/attire-sage-green.png', 'Sage Green Barong Tagalog and Long Gown', 'Sage Green', 'Guests · Barong Tagalog &amp; Long Gown')">
      <div class="attire-illustration sage-bg">
        <img src="images/attire-sage-green.png" alt="" loading="lazy" decoding="async">
        <span class="attire-zoom-hint">Tap to enlarge</span>
      </div>
      <div class="attire-body">
        <div class="attire-swatch sage"></div>
        <p class="attire-label">Guests</p>
        <p class="attire-name">Sage Green</p>
        <p class="attire-desc">Formal attire in shades of sage green.</p>
        <div class="attire-outfits">
          <span class="attire-outfit-tag sage">♦ Barong Tagalog</span>
          <span class="attire-outfit-tag sage">♦ Long Gown</span>
        </div>
      </div>
    </button>
  </div>

  <div class="attire-note">
    <p>Strictly formal · No casual attire, please</p>
  </div>
</section>
