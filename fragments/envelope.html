<div id="envelope-screen">

  <div class="envelope-wrap" id="envWrap">

      <div class="env-body"></div>

      <div class="env-bottom"></div>

      <div class="env-card">
        <span class="env-card-mono">K &amp; N</span>
        <span class="env-card-date">April 18, 2026</span>
      </div>

      <div class="env-flap" id="envFlap"></div>

      <div class="env-seal-wrap">
        <button type="button" class="env-seal" id="envSeal" aria-label="Open your wedding invitation">
          <svg width="80" height="80" viewBox="0 0 76 76" aria-hidden="true" focusable="false">

            <circle cx="38" cy="38" r="32" fill="#1f3a4d"/>
            <circle cx="38" cy="38" r="29" fill="#2d5068"/>
            <circle cx="38" cy="38" r="25" fill="none" stroke="rgba(174,198,207,0.45)" stroke-width="0.8"/>
            <path d="M38 16 L40.8 30 L54 23 L44.5 35 L60 38 L44.5 41 L54 53 L40.8 46 L38 60 L35.2 46 L22 53 L31.5 41 L16 38 L31.5 35 L22 23 L35.2 30 Z" fill="#142535" opacity="0.5"/>

            <text x="38" y="42.5" text-anchor="middle" fill="rgba(230,242,248,0.92)" font-size="8" font-family="Cormorant Garamond, serif" font-weight="500" letter-spacing="2">K·N</text>

        <p class="env-hint" id="envHint">Click the seal to open</p>
      </div>

    </div>
  </div>
</div>
